<!DOCTYPE html>
<html lang="pt-br">
<<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronos 2026</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cronos 2026">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">

    <style>
        :root { --ouro: #d4af37; --bg: #000000; --card: #1c1c1e; --verde: #32d74b; --vermelho: #ff453a; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: #fff; margin: 0; padding: env(safe-area-inset-top) 15px 50px 15px;
        }

        /* Logomarca no Topo */
        .logo-container { text-align: center; padding: 20px 0; }
        .logo-icon { width: 50px; height: 50px; margin-bottom: 5px; }
        .logo-texto { font-size: 1.5rem; font-weight: 900; color: var(--ouro); letter-spacing: 3px; text-transform: uppercase; }

        .header { 
            background: var(--card); padding: 20px; border-radius: 25px; text-align: center; 
            margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        #relogio { font-size: 2.8rem; font-weight: 800; color: var(--ouro); font-variant-numeric: tabular-nums; }
        #dia-status { color: #888; font-weight: bold; margin-top: 5px; }

        .menu-navegacao { display: flex; gap: 10px; margin-bottom: 25px; background: #1c1c1e; padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; background: transparent; color: #888; transition: 0.3s; }
        .tab-btn.active { background: var(--ouro); color: #000; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }

        /* Estilo Quadro Unificado */
        .tabela-full { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 20px; overflow: hidden; display: none; }
        .tabela-full th { background: #2c2c2e; color: var(--ouro); padding: 15px; text-align: left; font-size: 0.8rem; }
        .tabela-full td { padding: 15px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .col-dia { font-weight: 900; color: var(--ouro); background: #1a1a1a; width: 80px; text-align: center; }

        /* Estilo Editor */
        .card-dia { background: var(--card); border-radius: 20px; margin-bottom: 20px; border: 1px solid #2c2c2e; padding: 15px; }
        .input-box { background: #000; color: #fff; border: 1px solid #3a3a3c; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; }
        
        .btn-acao { border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--ouro); color: #000; padding: 8px 15px; }
        .btn-save { background: var(--verde); color: #000; padding: 20px; width: 100%; font-size: 1.2rem; margin-top: 20px; }
        .btn-del { background: var(--vermelho); color: #fff; padding: 10px; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="https://cdn-icons-png.flaticon.com/512/3652/3652191.png" class="logo-icon" alt="Logo">
    <div class="logo-texto">Cronos 2026</div>
</div>

<div class="header">
    <div id="relogio">00:00:00</div>
    <div id="dia-status">---</div>
</div>

<div class="menu-navegacao">
    <button id="btn-edit" class="tab-btn active" onclick="switchTab('edit')">📝 EDITAR</button>
    <button id="btn-view" class="tab-btn" onclick="switchTab('view')">📊 QUADRO</button>
</div>

<div id="tab-edit-content">
    <div id="lista-editor"></div>
    <button class="btn-acao btn-save" onclick="salvarBanco()">💾 SALVAR NO DISPOSITIVO (2026)</button>
</div>

<table id="tab-view-content" class="tabela-full">
    <thead>
        <tr>
            <th>DIA</th>
            <th>ATIVIDADE</th>
            <th>HORÁRIO</th>
        </tr>
    </thead>
    <tbody id="corpo-quadro"></tbody>
</table>

<script>
    const SENHA = "2026";
    const dias = ["Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado", "Domingo"];
    let db = JSON.parse(localStorage.getItem('cronos_db_2026')) || {};

    function switchTab(tab) {
        document.getElementById('tab-edit-content').style.display = tab === 'edit' ? 'block' : 'none';
        document.getElementById('tab-view-content').style.display = tab === 'view' ? 'table' : 'none';
        document.getElementById('btn-edit').classList.toggle('active', tab === 'edit');
        document.getElementById('btn-view').classList.toggle('active', tab === 'view');
        if(tab === 'view') buildQuadro();
    }

    function renderEditor() {
        const root = document.getElementById('lista-editor');
        root.innerHTML = '';
        dias.forEach(dia => {
            const aulas = db[dia] || [];
            let html = aulas.map((a, i) => `
                <div style="background:#121212; padding:12px; border-radius:15px; margin-top:10px; border-left:4px solid var(--ouro)">
                    <input class="input-box" type="text" value="${a.nome}" placeholder="Atividade" onchange="upd('${dia}',${i},'nome',this.value)">
                    <input class="input-box" type="text" value="${a.local}" placeholder="Local" onchange="upd('${dia}',${i},'local',this.value)">
                    <div style="display:flex; gap:10px;">
                        <input class="input-box" type="time" value="${a.ini}" onchange="upd('${dia}',${i},'ini',this.value)">
                        <input class="input-box" type="time" value="${a.fim}" onchange="upd('${dia}',${i},'fim',this.value)">
                    </div>
                    <button class="btn-acao btn-del" onclick="del('${dia}',${i})">Excluir</button>
                </div>
            `).join('');
            root.innerHTML += `<div class="card-dia">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--ouro); font-weight:bold;">${dia}</span>
                    <button class="btn-acao btn-add" onclick="add('${dia}')">＋</button>
                </div>
                ${html}
            </div>`;
        });
    }

    function buildQuadro() {
        const corpo = document.getElementById('corpo-quadro');
        corpo.innerHTML = '';
        dias.forEach(dia => {
            const aulas = db[dia] || [];
            aulas.forEach((a, i) => {
                corpo.innerHTML += `<tr>
                    <td class="col-dia">${i === 0 ? dia.substring(0,3) : ''}</td>
                    <td><strong>${a.nome}</strong><br><small style="color:#888">${a.local}</small></td>
                    <td><span style="color:var(--verde)">${a.ini}</span><br><span style="color:var(--vermelho)">${a.fim}</span></td>
                </tr>`;
            });
        });
    }

    function add(dia) { if(!db[dia]) db[dia] = []; db[dia].push({nome:'', local:'', ini:'', fim:''}); renderEditor(); }
    function upd(dia, i, f, v) { db[dia][i][f] = v; }
    function del(dia, i) { if(prompt("Senha:")===SENHA) { db[dia].splice(i,1); renderEditor(); } }
    function salvarBanco() { if(prompt("Senha:")===SENHA) { localStorage.setItem('cronos_db_2026', JSON.stringify(db)); alert("Salvo!"); } }

    function ticker() {
        const n = new Date();
        const h = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
        const d = dias[n.getDay() === 0 ? 6 : n.getDay()-1];
        document.getElementById('relogio').innerText = n.toLocaleTimeString('pt-BR');
        document.getElementById('dia-status').innerText = d;

        if(db[d] && n.getSeconds() === 0) {
            db[d].forEach(a => {
                if(a.ini === h) alert("🔔 INÍCIO: " + a.nome + " em " + a.local);
                if(a.fim === h) alert("🛑 TÉRMINO: " + a.nome + " em " + a.local);
            });
        }
    }

    renderEditor();
    setInterval(ticker, 1000);
</script>
</body>
</html>
